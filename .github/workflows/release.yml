name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit Rust dependencies
        run: cargo install cargo-audit --locked && cd src-tauri && cargo audit
        continue-on-error: true

      - name: Build Tauri app (Linux)
        if: runner.os != 'Windows'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Build Tauri app (Windows, NSIS only)
        if: runner.os == 'Windows'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --target ${{ matrix.target }} --bundles nsis

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artifacts-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage*" -o -name "*.exe" -o -name "*.msi*" -o -name "*.nsis.zip*" \) -exec cp {} release-files/ \;
          echo "=== Release files ==="
          ls -lh release-files/ || echo "No release files found"
          [ -f "$(find release-files -type f -print -quit)" ] || { echo "ERROR: No release files collected, aborting"; exit 1; }

      - name: Generate updater manifest (latest.json)
        env:
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          REPO_URL: https://github.com/${{ github.repository }}/releases/download
        run: |
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Discover updater artifact names from actual files to avoid tag/version mismatch issues.
          LINUX_ARCHIVE=$(find release-files -maxdepth 1 -type f -name "*.AppImage.tar.gz" -printf "%f\n" | head -n1)
          WINDOWS_ARCHIVE=$(find release-files -maxdepth 1 -type f -name "*x64-setup.nsis.zip" -printf "%f\n" | head -n1)

          if [ -z "$LINUX_ARCHIVE" ] || [ -z "$WINDOWS_ARCHIVE" ]; then
            echo "Missing updater artifacts: linux='$LINUX_ARCHIVE' windows='$WINDOWS_ARCHIVE'"
            exit 1
          fi

          APPIMAGE_SIG=""
          NSIS_SIG=""
          [ -f "release-files/${LINUX_ARCHIVE}.sig" ] && APPIMAGE_SIG=$(cat "release-files/${LINUX_ARCHIVE}.sig")
          [ -f "release-files/${WINDOWS_ARCHIVE}.sig" ] && NSIS_SIG=$(cat "release-files/${WINDOWS_ARCHIVE}.sig")

          # Build latest.json with jq for proper escaping
          jq -n \
            --arg version "$VERSION" \
            --arg notes "MooshieUI ${TAG}" \
            --arg pub_date "$PUB_DATE" \
            --arg linux_sig "$APPIMAGE_SIG" \
            --arg linux_url "${REPO_URL}/${TAG}/${LINUX_ARCHIVE}" \
            --arg win_sig "$NSIS_SIG" \
            --arg win_url "${REPO_URL}/${TAG}/${WINDOWS_ARCHIVE}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "linux-x86_64": { signature: $linux_sig, url: $linux_url },
                "windows-x86_64": { signature: $win_sig, url: $win_url }
              }
            }' > release-files/latest.json

          echo "=== latest.json ==="
          cat release-files/latest.json

      - name: Preserve release files before checkout
        run: cp -r release-files /tmp/release-files

      - name: Checkout (for release notes)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          # Build release body: installer blurb + changelog from RELEASE_NOTES.md
          printf '%s\n' \
            '**One-click installer** — just download and run. The app will automatically install ComfyUI, Python, PyTorch, and everything else you need on first launch.' \
            '' \
            '### Downloads' \
            '| Platform | File |' \
            '|----------|------|' \
            '| **Windows** | `.msi` or `.exe` |' \
            '| **Linux** | `.deb` or `.AppImage` |' \
            '' \
            '---' \
            '' \
            > /tmp/release-body.md

          # Append only this version's section from RELEASE_NOTES.md
          if [ -f RELEASE_NOTES.md ]; then
            # Extract from "## What's New in vX.Y.Z" until the next "---" or next version heading
            sed -n "/^## What's New in ${TAG}/,/^---$/p" RELEASE_NOTES.md | sed '$ { /^---$/d }' >> /tmp/release-body.md
          fi

          gh release create "${TAG}" \
            --repo "${{ github.repository }}" \
            --title "MooshieUI ${TAG}" \
            --notes-file /tmp/release-body.md \
            /tmp/release-files/*

  # -------------------------------------------------------------------------
  # Headless server binary (no webkit / Tauri deps required)
  # -------------------------------------------------------------------------
  build-server:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends pkg-config libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri

      - name: Build server binary
        run: |
          cd src-tauri
          cargo build --release --no-default-features --features server --bin mooshieui-server

      - name: Upload server binary
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mooshieui-server-linux-x86_64
          path: src-tauri/target/release/mooshieui-server
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Docker image → GitHub Container Registry
  # -------------------------------------------------------------------------
  docker-publish:
    needs: build-server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mooshieui
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min,ignore-error=true
