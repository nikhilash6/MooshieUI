# Admin credentials — required on first run (users cannot self-register).
#   kubectl -n mooshieui create secret generic mooshieui-admin \
#     --from-literal=username=admin \
#     --from-literal=password=YOUR_PASSWORD
apiVersion: v1
kind: Secret
metadata:
  name: mooshieui-admin
  namespace: mooshieui
type: Opaque
data:
  # echo -n 'admin' | base64
  username: YWRtaW4=
  # echo -n 'changeme' | base64  ← REPLACE THIS
  password: Y2hhbmdlbWU=
---
# Cloudflare Tunnel token (optional — remove if not using cloudflared sidecar).
#   kubectl -n mooshieui create secret generic cloudflare-tunnel \
#     --from-literal=token=YOUR_TUNNEL_TOKEN
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-tunnel
  namespace: mooshieui
type: Opaque
data:
  # echo -n 'YOUR_TOKEN' | base64
  token: ""
